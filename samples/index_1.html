<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arc Dash</title><style>
body{margin:0;display:grid;place-items:center;height:100vh;background:#0f1115;color:#e9eef5;font:16px system-ui}
#ui{position:fixed;top:14px;left:14px;line-height:1.35} canvas{width:min(92vw,520px);height:min(92vw,520px);touch-action:manipulation}
</style></head><body>
<div id="ui"></div><canvas id="c" width="520" height="520"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d'),ui=document.getElementById('ui'),TAU=Math.PI*2;
let best=+localStorage.arcDashBest||0,score,combo,t,speed,a,arc,arcW,last,run;
const rand=()=>Math.random()*TAU,dist=(u,v)=>Math.abs((((u-v+Math.PI)%TAU)+TAU)%TAU-Math.PI);
function reset(){score=0;combo=0;t=30;speed=2.1;a=0;arc=rand();arcW=1.25;last=0;run=true;loop(0)}
function click(){
 if(!run) return reset();
 if(dist(a,arc)<=arcW/2){combo++;score+=8+combo*2;speed*=1.12;arcW=Math.max(.22,arcW*.9);arc=rand()}
 else combo=0;
}
c.onpointerdown=click;
function draw(){
 const r=170,cx=260,cy=260;
 x.clearRect(0,0,520,520); x.lineWidth=12; x.strokeStyle='#2b3240'; x.beginPath(); x.arc(cx,cy,r,0,TAU); x.stroke();
 x.strokeStyle=`hsl(${(combo*35+140)%360} 95% 58%)`; x.lineCap='round'; x.beginPath(); x.arc(cx,cy,r,arc-arcW/2,arc+arcW/2); x.stroke();
 x.fillStyle='#fff'; x.beginPath(); x.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,8,0,TAU); x.fill();
 ui.textContent=`Score ${score}  Combo ${combo}  Time ${t.toFixed(1)}s  Best ${best}`;
 if(!run){x.fillStyle='#e9eef5';x.font='bold 26px system-ui';x.textAlign='center';x.fillText('Tap to restart',260,270)}
}
function loop(ts){
 if(!run) return draw();
 if(!last) last=ts; const dt=(ts-last)/1000; last=ts; t=Math.max(0,t-dt); a=(a+speed*dt)%TAU;
 if(t<=0){run=false; best=Math.max(best,score); localStorage.arcDashBest=best}
 draw(); requestAnimationFrame(loop);
}
reset();
</script></body></html>
